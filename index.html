<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus · login & register</title>
  <!-- external CSS -->
  <link rel="stylesheet" href="style.css">
</head><body>
  <div class="glass-card">
    <!-- tab navigation -->
    <div class="tab-bar">
      <button class="tab active" id="tabLogin" data-form="login"><i class="fas fa-arrow-right-to-bracket"></i> Log in</button>
      <button class="tab" id="tabRegister" data-form="register"><i class="fas fa-user-plus"></i> Register</button>
    </div>

    <!-- forms container (both panels) -->
    <div class="forms-wrapper">
      <!-- LOGIN PANEL -->
      <div class="form-panel active" id="loginPanel">
        <form id="loginForm">
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input class="input-field" type="email" id="loginEmail" placeholder="Email address" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input class="input-field" type="password" id="loginPassword" placeholder="Password" required>
          </div>

          <div class="helper-row">
            <label class="checkbox-label">
              <input type="checkbox" checked> <span>Keep me signed in</span>
            </label>
            <a href="#" class="forgot-link">Forgot?</a>
          </div>

          <button type="submit" class="btn-submit"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>

          <div class="switch-panel">
            New here? <a id="switchToRegisterBtn">Create an account</a>
          </div>
        </form>
      </div>

      <!-- REGISTER PANEL -->
      <div class="form-panel" id="registerPanel">
        <form id="registerForm">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input class="input-field" type="text" id="regName" placeholder="Full name" required>
          </div>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input class="input-field" type="email" id="regEmail" placeholder="Email address" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input class="input-field" type="password" id="regPassword" placeholder="Password" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input class="input-field" type="password" id="regConfirm" placeholder="Confirm password" required>
          </div>

          <div class="helper-row" style="margin-bottom: 1.8rem;">
            <label class="checkbox-label">
              <input type="checkbox" required> <span>I agree to Terms & Privacy</span>
            </label>
          </div>

          <button type="submit" class="btn-submit"><i class="fas fa-user-plus" <a href="home.html"></a> </i> Register</button>

          <div class="switch-panel">
            Already have an account? <a id="switchToLoginBtn">Sign in</a>
          </div>
        </form>
      </div>
    </div>

      </div>
  <!-- external JavaScript -->
  <script src="script.js"></script>
</body>
</html>
