<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barter Hub · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glass-card">
    <div class="tab-bar">
      <button class="tab active" id="tabLogin"><i class="fas fa-right-to-bracket"></i> Log in</button>
      <button class="tab" id="tabRegister"><i class="fas fa-user-plus"></i> Register</button>
    </div>

    <div class="forms-wrapper">
      <!-- LOGIN PANEL -->
      <div class="form-panel active" id="loginPanel">
        <form id="loginForm">
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input class="input-field" type="email" id="loginEmail" placeholder="Email address" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input class="input-field" type="password" id="loginPassword" placeholder="Password" required>
          </div>
          <button type="submit" class="btn-submit"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>
          <div class="switch-panel">
            New here? <a id="switchToRegisterBtn">Create an account</a>
          </div>
        </form>
      </div>

      <!-- REGISTER PANEL -->
      <div class="form-panel" id="registerPanel">
        <form id="registerForm">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input class="input-field" type="text" id="regName" placeholder="Full name" required>
          </div>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input class="input-field" type="email" id="regEmail" placeholder="Email address" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input class="input-field" type="password" id="regPassword" placeholder="Password" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input class="input-field" type="password" id="regConfirm" placeholder="Confirm password" required>
          </div>
          <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Register</button>
          <div class="switch-panel">
            Already have an account? <a id="switchToLoginBtn">Sign in</a>
          </div>
        </form>
      </div>
    </div>
    <hr>
    <div class="demo-note"><i class="fas fa-code"></i> Barter Hub · demo</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
