<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barter Hub · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="logo"><i class="fas fa-exchange-alt"></i> Barter Hub</a>
      <div class="nav-links">
        <a href="home.html"><i class="fas fa-home"></i> Home</a>
        <a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title">Your Dashboard</h1>

    <section class="add-item-section">
      <h2><i class="fas fa-plus-circle"></i> List a new item</h2>
      <form id="addItemForm" class="add-item-form">
        <div class="form-group">
          <input type="text" id="itemName" placeholder="Item name" required>
        </div>
        <div class="form-group">
          <textarea id="itemDescription" placeholder="Description" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <input type="text" id="itemImage" placeholder="Image URL (optional)">
        </div>
        <button type="submit" class="btn-submit"><i class="fas fa-plus"></i> Add item</button>
      </form>
    </section>

    <section class="my-items-section">
      <h2><i class="fas fa-box"></i> Your listed items</h2>
      <div class="item-grid" id="myItemsGrid"></div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;
      loadMyItems();
      setupAddItemForm();
      setupLogout();
    });
  </script>
</body>
</html>
